name: Ping Supabase

on:
  schedule:
    - cron: "*/10 * * * *"  # mỗi 10 phút
  workflow_dispatch: # cho phép chạy tay

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase API
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/products?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_API_KEY }}" \
          -H "Accept-Profile: product"
