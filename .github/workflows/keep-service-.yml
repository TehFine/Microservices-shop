name: Keep Render Services Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping All Services
    runs-on: ubuntu-latest

    steps:
      
      - name: Ping Product Service
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://product-service-vwo6.onrender.com/api/products?limit=1)
          echo "Product Service: $STATUS"

      - name: Ping Auth Service
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://auth-service-1zng.onrender.com/health)
          echo "Auth Service: $STATUS"

      - name: Ping Order Service
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://order-service-qj7r.onrender.com/api/orders?limit=1)
          echo "Order Service: $STATUS"

      - name: Ping API Gateway
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-gateway-64tu.onrender.com/api/products?limit=1)
          echo "API Gateway: $STATUS"

      - name: Summary
        run: |
          echo "=============================="
          echo "Ping completed at $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=============================="
