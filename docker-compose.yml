version: "3.9"

networks:
  microservices-net:
    driver: bridge

services:
  # Không cần postgres và mongo container
  # vì dùng Supabase cloud và MongoDB Atlas

  # ─── Product Service ────────────────────────
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product_service
    environment:
      NODE_ENV: production
      PORT: 3001
      SERVICE_NAME: product-service
      DATABASE_URL: ${PRODUCT_DATABASE_URL}
    ports:
      - "3001:3001"
    networks:
      - microservices-net
    restart: unless-stopped

  # ─── Auth Service ───────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth_service
    environment:
      NODE_ENV: production
      PORT: 3003
      SERVICE_NAME: auth-service
      DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    ports:
      - "3003:3003"
    networks:
      - microservices-net
    restart: unless-stopped

  # ─── Order Service ──────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order_service
    environment:
      NODE_ENV: production
      PORT: 3002
      SERVICE_NAME: order-service
      MONGODB_URI: ${MONGODB_URI}
      PRODUCT_SERVICE_URL: http://product-service:3001
    ports:
      - "3002:3002"
    networks:
      - microservices-net
    restart: unless-stopped

  # ─── API Gateway ────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      PRODUCT_SERVICE_URL: http://product-service:3001
      ORDER_SERVICE_URL: http://order-service:3002
      AUTH_SERVICE_URL: http://auth-service:3003
    ports:
      - "3000:3000"
    depends_on:
      - product-service
      - auth-service
      - order-service
    networks:
      - microservices-net
    restart: unless-stopped